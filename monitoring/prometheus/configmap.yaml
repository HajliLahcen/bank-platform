apiVersion: v1
kind: ConfigMap

metadata:
  name: prometheus-config

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:

    - job_name: prometheus
      static_configs:
      - targets:
        - localhost:9090

    - job_name: flask-api
      static_configs:
      - targets:
        - flask-api:8000
