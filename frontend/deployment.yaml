apiVersion: apps/v1
kind: Deployment

metadata:
  name: bank-frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: bank-frontend

  template:

    metadata:
      labels:
        app: bank-frontend

    spec:
      containers:
      - name: frontend
        image: bank-frontend:v2
        imagePullPolicy: Never

        ports:
        - containerPort: 80
